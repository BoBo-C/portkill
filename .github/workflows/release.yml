name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      # Universal binary (Apple Silicon + Intel), uploads .dmg to the release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PortKill ${{ github.ref_name }}"
          releaseBody: "See README for installation notes (app is unsigned — run `xattr -cr /Applications/PortKill.app` if macOS refuses to open it)."
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
